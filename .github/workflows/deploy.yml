# .github/workflows/deploy.yml

name: Deploy Next.js (Standalone)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build


      - name: Prepare standalone package
        run: |
          # Copy static files and public folder into standalone
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Remove old build on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /var/www/next-portfolio/.next/*

      - name: Upload standalone build
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next/standalone/*"
          target: "/var/www/next-portfolio/.next/"
          strip_components: 2

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/next-portfolio/

            # Load NVM and use Node 22
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 22

            command -v node
            command -v pm2

            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js 
            pm2 save
            echo "✅ Standalone Next.js deployed!"